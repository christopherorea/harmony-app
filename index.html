<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Web Harmony Tool</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>
    <div class="harmony-app">
        <main class="main-workspace">
            
            <!-- SECCIÓN IZQUIERDA (Círculo de Quintas y Piano Roll, con el mismo ancho) -->
            <div class="left-workspace">
                <section class="panel circle-panel">
                    <h2>Círculo de Quintas</h2> 
                    <div id="circle-container"></div>
                </section>
                
                <section class="panel keyboard-panel">
                    <div id="keyboard" class="keyboard-container"></div>
                </section>
            </div>

            <!-- SECCIÓN DERECHA (Área de Edición de Progresiones, Tocador Tonnetz y Editor de Acordes) -->
            <div class="right-workspace">
                <section class="panel edit-play-panel">
                    <!-- Cabecera de la Progresión Activa (Siempre visible) -->
                    <div class="active-progression-header">
                        <h2>Progresión Activa</h2>
                        <div class="progression-top-bar" id="progression-slots"></div>
                        
                        <div class="loop-control-bar">
                            <button id="btn-toggle-loop" class="btn">▶️ REPRODUCIR LOOP</button>
                            <div class="bpm-selector">
                                <span>Tempo (BPM):</span>
                                <input type="range" id="loop-bpm" min="40" max="200" value="90">
                                <span id="bpm-val">90</span>
                            </div>
                        </div>

                        <div class="progression-info-display">
                            <h3 id="prog-name">Selecciona una progresión</h3>
                            <p id="prog-roman" class="roman-text">-</p>
                            <p id="prog-chords" class="chord-text">-</p>
                        </div>
                    </div>

                    <!-- Barra de Pestañas (Switch entre secciones) -->
                    <div class="right-tabs">
                        <button class="btn tab-btn active" data-tab="tab-editor">🎹 Editor de Acordes</button>
                        <button class="btn tab-btn" data-tab="tab-tonnetz">📐 Tonnetz Isomórfico</button>
                        <button class="btn tab-btn" data-tab="tab-progressions">🎼 Lista de Progresiones</button>
                    </div>

                    <!-- Contenido de las Pestañas -->
                    <div class="tab-contents">
                        <!-- Pestaña 1: Editor de Acordes -->
                        <div id="tab-editor" class="tab-content active">
                            <div class="synth-selector-container">
                                <div class="selector-row">
                                    <span>Tipo de Onda:</span>
                                    <select id="select-synth-type" class="btn">
                                        <option value="sine">Flat / Sine (Suave)</option>
                                        <option value="square">Squared (Cuadrada)</option>
                                        <option value="triangle">Triangle (Triangular)</option>
                                        <option value="sawtooth">Sawtooth (Sierra)</option>
                                    </select>
                                </div>

                                <div class="selector-row">
                                    <span>Modo Teclado PC:</span>
                                    <select id="select-kbd-mode" class="btn">
                                        <option value="piano">Piano Roll (A-W-S-D...)</option>
                                        <option value="tonnetz">Isomórfico Tonnetz (1-Q-A-Z...)</option>
                                    </select>
                                </div>

                                <div class="selector-row">
                                    <span>Estado de Audio:</span>
                                    <button id="btn-toggle-audio" class="btn">AUDIO: ON</button>
                                </div>
                            </div>

                            <div class="grid-5 utility-row">
                                <button class="btn sq utility">Create<br>Clip</button>
                                <button class="btn sq utility">Name<br>Clip</button>
                                <button class="btn sq utility" id="btn-reset">Reset</button>
                                <button class="btn sq utility">Force<br>Min7</button>
                                <button class="btn sq utility toggleable" id="btn-multi-select">Multi<br>Select</button>
                            </div>

                            <div class="grid-5 extension-matrix" id="extension-matrix">
                                <button class="btn sq ext" data-type="add" data-value="6">6</button>
                                <button class="btn sq ext" data-type="add" data-value="7">7</button>
                                <button class="btn sq ext" data-type="add" data-value="7#9">7#9</button>
                                <button class="btn sq ext" data-type="add" data-value="9">9</button>
                                <button class="btn sq ext" data-type="add" data-value="b9">b9</button>

                                <button class="btn sq ext" data-type="add" data-value="#9">#9</button>
                                <button class="btn sq ext" data-type="add" data-value="11">11</button>
                                <button class="btn sq ext" data-type="add" data-value="#11">#11</button>
                                <button class="btn sq ext" data-type="add" data-value="13">13</button>
                                <button class="btn sq ext" data-type="add" data-value="b13">b13</button>

                                <button class="btn sq ext" data-type="mod" data-value="maj7">Maj<br>7</button>
                                <button class="btn sq ext" data-type="mod" data-value="maj9">Maj<br>9</button>
                                <button class="btn sq ext" data-type="mod" data-value="maj11">Maj<br>11</button>
                                <button class="btn sq ext" data-type="mod" data-value="maj13">Maj<br>13</button>
                                <button class="btn sq ext" data-type="mod" data-value="aug">Aug</button>

                                <button class="btn sq ext" data-type="add" data-value="add9">Add<br>9</button>
                                <button class="btn sq ext" data-type="add" data-value="add11">Add<br>11</button>
                                <button class="btn sq ext" data-type="add" data-value="add13">Add<br>13</button>
                                <button class="btn sq ext" data-type="sus" data-value="sus4">Sus4</button>
                                <button class="btn sq ext" data-type="sus" data-value="sus2">Sus2</button>
                                
                                <button class="btn sq ext" data-type="mod" data-value="dim">Dim</button>
                                <button class="btn sq ext" data-type="mod" data-value="dim7">Dim7</button>
                                <button class="btn sq ext" data-type="mod" data-value="halfDim">Half<br>Dim</button>
                                <button class="btn sq ext" data-type="root" data-value="-12">Root<br>-12</button>
                                <button class="btn sq ext" data-type="root" data-value="-24">Root<br>-24</button>
                            </div>
                        </div>

                        <!-- Pestaña 2: Tonnetz Isomórfico -->
                        <div id="tab-tonnetz" class="tab-content hidden">
                            <div id="tonnetz-canvas"></div>
                        </div>

                        <!-- Pestaña 3: Lista de Progresiones -->
                        <div id="tab-progressions" class="tab-content hidden">
                            <div class="preset-list" id="preset-list"></div>
                        </div>
                    </div>
                </section>
            </div>

        </main>

        <script>
            const progressionPresets = [
                { id: 'popClassic1', label: 'I, V, vi, IV (Pop Classic 1)' },
                { id: 'popClassic2', label: 'vi, IV, I, V (Pop Classic 2)' },
                { id: 'popBallad50s', label: 'I, vi, IV, V (50s Progression)' },
                { id: 'rockBallad', label: 'Rock Ballad Turnaround' },
                { id: 'cinematicSuspense', label: 'Cinematic Suspense (i, bVI)' },
                { id: 'epicHeroic', label: 'Epic Heroic (I, bVII, IV)' },
                { id: 'jazzStandard', label: 'ii, V, I (Jazz Standard)' },
                { id: 'jazzMinor', label: 'iiø, V7, i (Minor ii-V-I)' },
                { id: 'neoSoul', label: 'Neo-Soul Movement (iii, VI, ii, V)' },
                { id: 'pachelbel', label: 'Pachelbel\'s Canon' },
                { id: 'andalusianCadence', label: 'Andalusian Cadence' },
                { id: 'tritoneSub', label: 'Jazz Tritone Sub (ii, bII7, I)' }
            ];

            const presetListEl = document.getElementById('preset-list');
            progressionPresets.forEach(preset => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'btn wide preset-btn';
                button.dataset.preset = preset.id;
                button.textContent = preset.label;
                presetListEl.appendChild(button);
            });
        </script>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/MusicTheory.js"></script>
    <script src="js/core/MidiManager.js"></script>
    <script src="js/core/SoundEngine.js"></script>
    <script src="js/components/CircleOfFifths.js"></script>
    <script src="js/components/ProgressionManager.js"></script>
    <script src="js/components/ModifierEditor.js"></script>
    <script src="js/components/InteractiveTonnetz.js"></script>
    <script src="js/components/Keyboard.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
